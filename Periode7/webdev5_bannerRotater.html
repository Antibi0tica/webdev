<!DOCTYPE html>
<html>
    <head>
        <title>bannerRotater</title>

        <script>
            function bannerRotater(){
                var images = ['img/back.jpg', 'img/front.jpg']
                var count = 0;

                setInterval(rotater,2000);

                function rotater() {
 
                var arrayIndex = count % images.length;
                count++;
                console.log(images[arrayIndex]);
                document.getElementById("banner").src = images[arrayIndex];
                
                    
                }

            }
        </script>
    </head>

    <body>
        <button onclick="bannerRotater()">Click</button>
        <img src="" alt="" id="banner" height="250">
    </body>
</html>
